<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokéPack Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --red:#CC0000; --red-dark:#8B0000;
      --gold:#FFD700; --gold-dk:#B8860B;
      --bg:#08080f; --bg2:#0f0f1c; --card:#141428; --card2:#1c1c38;
      --text:#f0f0f8; --muted:#7070a0; --border:rgba(255,255,255,0.07);
    }
    body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
    body::before {
      content:''; position:fixed; inset:0;
      background-image:radial-gradient(rgba(255,255,255,.025) 1px, transparent 1px);
      background-size:30px 30px; pointer-events:none; z-index:0;
    }

    /* ── Header ── */
    header {
      position:sticky; top:0; z-index:300;
      background:linear-gradient(135deg, var(--red-dark), var(--red) 60%, #dd2200);
      border-bottom:3px solid var(--gold);
      box-shadow:0 4px 30px rgba(0,0,0,.7);
      padding:.85rem 1.5rem;
      display:flex; justify-content:space-between; align-items:center; gap:1rem;
    }
    .logo { font-family:'Press Start 2P',monospace; font-size:clamp(.55rem,2.5vw,1rem); color:var(--gold); text-shadow:2px 2px 0 #000; white-space:nowrap; }
    .money-pill { background:rgba(0,0,0,.45); border:2px solid var(--gold); border-radius:50px; padding:.4rem 1.1rem; font-size:1.15rem; font-weight:900; color:var(--gold); white-space:nowrap; }
    .money-pill.pop { animation:moneyPop .4s ease; }
    @keyframes moneyPop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18);color:#fff} }

    /* ── Nav ── */
    nav { position:sticky; top:67px; z-index:200; background:var(--bg2); border-bottom:1px solid var(--border); display:flex; justify-content:center; gap:.5rem; padding:.75rem 1rem; }
    .nav-btn { font-family:'Nunito',sans-serif; font-weight:800; font-size:.85rem; background:transparent; border:2px solid var(--border); color:var(--muted); border-radius:50px; padding:.5rem 1.3rem; cursor:pointer; transition:all .2s; }
    .nav-btn:hover { border-color:rgba(255,255,255,.3); color:var(--text); }
    .nav-btn.active { background:var(--red); border-color:var(--red); color:#fff; }

    /* ── Pages ── */
    .page { display:none; padding:1.8rem 1.4rem; max-width:1300px; margin:0 auto; position:relative; z-index:1; }
    .page.active { display:block; }
    .page-title { font-family:'Press Start 2P',monospace; font-size:clamp(.58rem,2vw,.82rem); color:var(--gold); margin-bottom:1.6rem; letter-spacing:2px; }

    /* ── Shop ── */
    .shop-controls { display:flex; flex-wrap:wrap; gap:.7rem; margin-bottom:1.4rem; align-items:center; }
    .search-wrap { position:relative; flex:1; min-width:200px; }
    .search-wrap .icon { position:absolute; left:.85rem; top:50%; transform:translateY(-50%); font-size:1rem; pointer-events:none; }
    .search-input { width:100%; background:var(--card2); border:1px solid var(--border); color:var(--text); border-radius:50px; padding:.55rem .9rem .55rem 2.3rem; font-family:'Nunito',sans-serif; font-size:.9rem; outline:none; transition:border-color .2s; }
    .search-input:focus { border-color:rgba(255,255,255,.3); }
    .series-sel { background:var(--card2); border:1px solid var(--border); color:var(--text); border-radius:50px; padding:.55rem 1rem; font-family:'Nunito',sans-serif; font-size:.85rem; cursor:pointer; }
    .pack-count-lbl { color:var(--muted); font-size:.8rem; margin-left:auto; }

    .pack-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:1.3rem; }
    .pack-card { background:var(--card); border-radius:18px; border:1px solid var(--border); overflow:hidden; transition:transform .25s, box-shadow .25s, border-color .25s; position:relative; }
    .pack-card:hover { transform:translateY(-5px); box-shadow:0 16px 40px rgba(0,0,0,.6); border-color:rgba(255,255,255,.2); }
    .pack-card.hot::before { content:'🔥 HOT'; position:absolute; top:10px; right:10px; z-index:5; background:linear-gradient(135deg,#ff6b00,#ff0000); color:#fff; font-size:.62rem; font-weight:900; padding:.25rem .6rem; border-radius:20px; letter-spacing:.5px; }

    .pack-logo-wrap { width:100%; height:100px; display:flex; align-items:center; justify-content:center; padding:.8rem; overflow:hidden; position:relative; }
    .pack-logo-wrap::after { content:''; position:absolute; inset:0; background:linear-gradient(to bottom, transparent 60%, var(--card) 100%); }
    .pack-logo-img { max-width:85%; max-height:72px; object-fit:contain; filter:drop-shadow(0 2px 10px rgba(0,0,0,.6)); position:relative; z-index:1; }

    .pack-body { padding:.9rem 1rem 1rem; }
    .pack-series { font-size:.68rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
    .pack-name { font-weight:900; font-size:1rem; margin:.2rem 0 .4rem; line-height:1.2; }
    .pack-desc { font-size:.75rem; color:var(--muted); margin-bottom:.7rem; line-height:1.4; }
    .pack-odds { display:flex; flex-wrap:wrap; gap:.25rem; margin-bottom:.9rem; }
    .odds-pip { font-size:.62rem; font-weight:800; padding:.18rem .45rem; border-radius:20px; background:rgba(0,0,0,.35); }
    .pack-footer { display:flex; align-items:center; justify-content:space-between; gap:.5rem; }
    .pack-price { font-size:1.3rem; font-weight:900; color:var(--gold); }
    .buy-btn { background:linear-gradient(135deg, var(--gold-dk), var(--gold)); color:#111; border:none; border-radius:50px; padding:.55rem 1.2rem; font-family:'Nunito',sans-serif; font-weight:900; font-size:.88rem; cursor:pointer; transition:transform .2s, box-shadow .2s; }
    .buy-btn:hover { transform:scale(1.06); box-shadow:0 4px 16px rgba(255,215,0,.35); }
    .buy-btn:disabled { background:#333; color:#666; cursor:not-allowed; transform:none; box-shadow:none; }

    /* ── Pack Modal ── */
    #packModal { display:none; position:fixed; inset:0; z-index:600; background:rgba(0,0,0,.96); flex-direction:column; align-items:center; padding:1.5rem 1rem; overflow-y:auto; }
    #packModal.open { display:flex; }

    .modal-hdr { text-align:center; margin-bottom:1.3rem; }
    .modal-set-name { font-family:'Press Start 2P',monospace; font-size:clamp(.58rem,2vw,.88rem); color:var(--gold); margin-bottom:.4rem; }
    .modal-hint { color:var(--muted); font-size:.85rem; font-weight:700; }
    .offline-badge { display:inline-block; background:#333; color:#aaa; font-size:.65rem; font-weight:700; padding:.15rem .5rem; border-radius:10px; margin-top:.3rem; }

    .flip-grid { display:flex; flex-wrap:wrap; gap:.8rem; justify-content:center; max-width:820px; width:100%; }

    /* Card flip */
    .flip-slot { width:100px; height:140px; perspective:700px; cursor:pointer; flex-shrink:0; }
    .flip-inner { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform .6s cubic-bezier(.4,0,.2,1); }
    .flip-slot.flipped .flip-inner { transform:rotateY(180deg); }
    .flip-face { position:absolute; inset:0; border-radius:10px; backface-visibility:hidden; -webkit-backface-visibility:hidden; }

    /* Card Back */
    .flip-back { background:linear-gradient(145deg,#0a2744,#163a5e); border:2.5px solid #e8c840; display:flex; align-items:center; justify-content:center; }
    .flip-back:hover { border-color:#ffd700; box-shadow:0 0 12px rgba(255,215,0,.3); }
    .pokeball { width:52px; height:52px; border-radius:50%; border:3px solid #222; background:linear-gradient(to bottom, #dc3535 50%, #f0f0f0 50%); position:relative; box-shadow:inset 0 2px 4px rgba(255,255,255,.2), 0 2px 8px rgba(0,0,0,.5); }
    .pokeball::before { content:''; position:absolute; top:50%; left:-3px; right:-3px; height:3px; background:#222; transform:translateY(-50%); }
    .pokeball::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:14px; height:14px; border-radius:50%; background:#f0f0f0; border:3px solid #222; z-index:1; }

    /* Card Front — must NOT override position:absolute inherited from .flip-face */
    .flip-front { transform:rotateY(180deg); overflow:hidden; background:#111; border:2px solid transparent; }
    .flip-front img { width:100%; height:100%; object-fit:cover; display:block; }

    /* CSS fallback card when image fails */
    .card-css {
      width:100%; height:100%;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:.4rem; text-align:center; gap:.2rem;
    }
    .card-css .mon-emoji { font-size:2rem; }
    .card-css .mon-name { font-size:.6rem; font-weight:900; line-height:1.2; }
    .card-css .mon-rar { font-size:.52rem; font-weight:800; margin-top:.1rem; }

    /* Rarity glows */
    .flip-slot.tier-common   .flip-front { border-color:#888; }
    .flip-slot.tier-uncommon .flip-front { border-color:#3ddc5a; }
    .flip-slot.tier-rare     .flip-front { border-color:#4a8fe8; }
    .flip-slot.tier-holo     .flip-front { border-color:#c060ff; box-shadow:0 0 14px rgba(180,60,255,.6); }
    .flip-slot.tier-ultra    .flip-front { border-color:#ff8800; box-shadow:0 0 14px rgba(255,136,0,.6); }
    .flip-slot.tier-secret   .flip-front { animation:rainbowBorder 2s linear infinite; }
    @keyframes rainbowBorder {
      0%{border-color:#f00;box-shadow:0 0 18px #f00} 17%{border-color:#f70;box-shadow:0 0 18px #f70}
      33%{border-color:#fe0;box-shadow:0 0 18px #fe0} 50%{border-color:#0c0;box-shadow:0 0 18px #0c0}
      67%{border-color:#00f;box-shadow:0 0 18px #00f} 83%{border-color:#a0f;box-shadow:0 0 18px #a0f}
      100%{border-color:#f00;box-shadow:0 0 18px #f00}
    }

    /* Overlay badges on flipped cards */
    .rarity-badge { position:absolute; bottom:4px; left:0; right:0; text-align:center; font-size:.55rem; font-weight:900; text-shadow:0 1px 4px #000,0 0 8px #000; pointer-events:none; z-index:2; display:none; }
    .flip-slot.flipped .rarity-badge { display:block; }
    .val-badge { position:absolute; top:4px; right:4px; background:rgba(0,0,0,.78); color:var(--gold); font-size:.55rem; font-weight:900; padding:.15rem .35rem; border-radius:8px; pointer-events:none; z-index:2; display:none; }
    .flip-slot.flipped .val-badge { display:block; }

    /* Modal actions */
    .modal-actions { display:none; flex-wrap:wrap; gap:.8rem; justify-content:center; margin-top:1.4rem; }
    .modal-actions.show { display:flex; }
    .m-btn { font-family:'Nunito',sans-serif; font-weight:900; font-size:.9rem; border:none; border-radius:50px; padding:.75rem 1.8rem; cursor:pointer; transition:transform .2s; }
    .m-btn:hover { transform:scale(1.06); }
    .m-keep    { background:var(--red); color:#fff; }
    .m-commons { background:#2c2c44; color:#ccc; }
    .m-sell    { background:linear-gradient(135deg,var(--gold-dk),var(--gold)); color:#111; }
    .reveal-btn { font-family:'Nunito',sans-serif; font-weight:900; font-size:.9rem; background:linear-gradient(135deg,#1a4080,#2a6fcc); color:#fff; border:none; border-radius:50px; padding:.7rem 2.2rem; cursor:pointer; margin-top:1.2rem; transition:transform .2s, box-shadow .2s; }
    .reveal-btn:hover { transform:scale(1.05); box-shadow:0 5px 20px rgba(42,111,204,.5); }

    /* ── Collection ── */
    .coll-controls { display:flex; flex-wrap:wrap; gap:.6rem; align-items:center; margin-bottom:1.4rem; }
    .coll-sel { background:var(--card2); border:1px solid var(--border); color:var(--text); border-radius:10px; padding:.5rem .85rem; font-family:'Nunito',sans-serif; font-size:.83rem; cursor:pointer; }
    .coll-search { background:var(--card2); border:1px solid var(--border); color:var(--text); border-radius:10px; padding:.5rem .85rem; font-family:'Nunito',sans-serif; font-size:.83rem; outline:none; }
    .coll-search:focus { border-color:rgba(255,255,255,.25); }
    .coll-act { font-family:'Nunito',sans-serif; font-weight:800; font-size:.82rem; border:none; border-radius:50px; padding:.5rem 1.1rem; cursor:pointer; transition:transform .2s; }
    .coll-act:hover { transform:scale(1.04); }
    .btn-sell-commons { background:#2c2c44; color:#ccc; }
    .btn-sell-sel { background:linear-gradient(135deg,var(--gold-dk),var(--gold)); color:#111; margin-left:auto; display:none; }
    .btn-sell-sel.show { display:block; }
    .coll-summary { color:var(--muted); font-size:.78rem; }

    .inv-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(120px,1fr)); gap:.8rem; }
    .inv-card { border-radius:12px; border:2px solid var(--border); overflow:hidden; position:relative; cursor:pointer; transition:transform .2s, box-shadow .2s; background:#111; }
    .inv-card:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,.5); }
    .inv-card.selected { outline:3px solid var(--gold); outline-offset:2px; }
    .inv-img { width:100%; display:block; aspect-ratio:0.715; object-fit:cover; }
    .inv-img-placeholder { width:100%; aspect-ratio:0.715; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.3rem; padding:.5rem; background:var(--card2); text-align:center; }
    .inv-img-placeholder .em { font-size:2rem; }
    .inv-img-placeholder .nm { font-size:.6rem; font-weight:900; }
    /* Offline artwork frame — used in both pack opening and collection */
    .artwork-frame { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:.3rem; gap:.15rem; position:relative; }
    .artwork-img { width:82%; flex:1; object-fit:contain; filter:drop-shadow(0 2px 6px rgba(0,0,0,.6)); min-height:0; }
    .artwork-name { font-size:.6rem; font-weight:900; text-align:center; line-height:1.2; text-shadow:0 1px 3px #000; }
    .artwork-rar  { font-size:.52rem; font-weight:800; text-shadow:0 1px 3px #000; }
    /* Collection artwork card */
    .inv-artwork-wrap { width:100%; aspect-ratio:0.715; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:.4rem .3rem .2rem; gap:.2rem; }
    .inv-artwork-img { width:85%; flex:1; object-fit:contain; filter:drop-shadow(0 2px 5px rgba(0,0,0,.5)); min-height:0; }
    .inv-info { padding:.35rem .4rem .4rem; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); }
    .inv-name { font-size:.62rem; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .inv-meta { display:flex; justify-content:space-between; align-items:center; margin-top:.15rem; }
    .inv-rar { font-size:.55rem; font-weight:700; }
    .inv-val { font-size:.65rem; font-weight:900; color:var(--gold); }
    .inv-sell-overlay { position:absolute; inset:0; background:rgba(0,0,0,.72); display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .2s; }
    .inv-card:hover .inv-sell-overlay { opacity:1; }
    .inv-sell-btn { font-family:'Nunito',sans-serif; font-weight:900; font-size:.78rem; border:none; border-radius:20px; padding:.45rem .9rem; cursor:pointer; transition:transform .2s; }
    .inv-sell-btn:hover { transform:scale(1.08); }
    .inv-check { position:absolute; top:5px; right:5px; width:20px; height:20px; background:var(--gold); color:#111; border-radius:50%; font-size:.65rem; font-weight:900; display:none; align-items:center; justify-content:center; z-index:2; }
    .inv-card.selected .inv-check { display:flex; }

    /* Rarity borders collection */
    .inv-card.tier-common   { border-color:#666; }
    .inv-card.tier-uncommon { border-color:#3ddc5a; }
    .inv-card.tier-rare     { border-color:#4a8fe8; }
    .inv-card.tier-holo     { border-color:#c060ff; box-shadow:0 0 8px rgba(180,60,255,.25); }
    .inv-card.tier-ultra    { border-color:#ff8800; box-shadow:0 0 8px rgba(255,136,0,.25); }
    .inv-card.tier-secret   { animation:rainbowBorder 2s linear infinite; }

    /* ── Stats ── */
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(170px,1fr)); gap:1.1rem; }
    .stat-box { background:var(--card2); border:1px solid var(--border); border-radius:16px; padding:1.3rem; text-align:center; }
    .stat-lbl { font-size:.75rem; color:var(--muted); font-weight:700; margin-bottom:.5rem; }
    .stat-val { font-size:1.8rem; font-weight:900; color:var(--gold); }
    .best-box { grid-column:1/-1; display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap; text-align:left; }
    .best-img { width:80px; border-radius:8px; display:block; }
    .best-txt .name { font-size:1rem; font-weight:900; }
    .best-txt .rar  { font-size:.8rem; font-weight:700; margin:.2rem 0; }
    .best-txt .val  { font-size:1.3rem; font-weight:900; color:var(--gold); }
    .rar-breakdown { grid-column:1/-1; display:flex; flex-wrap:wrap; gap:1.2rem; justify-content:center; }
    .rb { text-align:center; }
    .rb-lbl { font-size:.68rem; font-weight:700; margin-bottom:.2rem; }
    .rb-n { font-size:1.4rem; font-weight:900; }

    /* ── Empty ── */
    .empty { grid-column:1/-1; text-align:center; padding:3.5rem 2rem; color:var(--muted); }
    .empty .icon { font-size:3rem; margin-bottom:1rem; }

    /* ── Loading ── */
    #loadOverlay { display:none; position:fixed; inset:0; z-index:900; background:rgba(0,0,0,.87); flex-direction:column; align-items:center; justify-content:center; gap:1rem; }
    #loadOverlay.show { display:flex; }
    .spinner { width:52px; height:52px; border:4px solid rgba(255,255,255,.1); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .load-txt { font-weight:700; color:var(--muted); font-size:.9rem; }
    .load-cancel { font-family:'Nunito',sans-serif; font-weight:800; font-size:.8rem; background:transparent; border:1px solid var(--muted); color:var(--muted); border-radius:20px; padding:.4rem 1rem; cursor:pointer; margin-top:.5rem; }
    .load-cancel:hover { border-color:var(--text); color:var(--text); }

    /* ── Toast ── */
    #toast { position:fixed; bottom:1.4rem; right:1.4rem; z-index:9999; background:#1e1e38; color:var(--text); padding:.85rem 1.4rem; border-radius:14px; font-weight:700; font-size:.87rem; max-width:320px; line-height:1.4; border-left:4px solid #555; transform:translateY(120px); opacity:0; transition:transform .35s, opacity .35s; }
    #toast.show { transform:translateY(0); opacity:1; }
    #toast.t-ok     { border-color:#2ecc71; }
    #toast.t-err    { border-color:#e74c3c; }
    #toast.t-holo   { border-color:#c060ff; background:#1a0535; }
    #toast.t-ultra  { border-color:#ff8800; background:#1e0e00; }
    #toast.t-secret { border-color:#ff3333; background:#1a0000; animation:rainbowBorder 2s linear infinite; }

    /* ── Sparkles ── */
    .spark { position:fixed; pointer-events:none; z-index:700; font-size:1.4rem; animation:sparkFly 1.1s ease-out forwards; }
    @keyframes sparkFly { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0} }

    @media(max-width:580px) {
      .flip-slot { width:80px; height:112px; }
      .pokeball { width:42px; height:42px; }
    }

    /* ── Battle ── */
    .battle-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.4rem; flex-wrap:wrap; gap:.8rem; }
    .bp-pill { background:linear-gradient(135deg,#1a1a40,#2a2a60); border:2px solid #5050c0; border-radius:50px; padding:.4rem 1.1rem; font-size:1rem; font-weight:900; color:#9090ff; }
    .retreats-pill { background:rgba(0,0,0,.35); border:2px solid var(--border); border-radius:50px; padding:.4rem 1rem; font-size:.85rem; font-weight:800; color:var(--muted); }

    .battle-selected-slots { display:flex; gap:.8rem; justify-content:center; margin-bottom:1.2rem; flex-wrap:wrap; }
    .bslot { width:90px; height:126px; border-radius:10px; border:2px dashed #333; display:flex; align-items:center; justify-content:center; font-size:2rem; color:#333; flex-shrink:0; }
    .bslot.filled { border-color:var(--gold); border-style:solid; overflow:hidden; position:relative; }
    .bslot.filled img, .bslot.filled .inv-artwork-wrap { width:100%; height:100%; }
    .bslot-rmv { position:absolute; top:2px; right:2px; background:rgba(0,0,0,.8); color:#fff; border:none; border-radius:50%; width:20px; height:20px; font-size:.6rem; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:900; z-index:5; }
    .start-battle-btn { display:block; margin:0 auto 1.2rem; font-family:'Nunito',sans-serif; font-weight:900; font-size:1rem; background:linear-gradient(135deg,#aa0000,#ff2222); color:#fff; border:none; border-radius:50px; padding:.75rem 2.8rem; cursor:pointer; transition:transform .2s, box-shadow .2s; }
    .start-battle-btn:disabled { background:#333; color:#666; cursor:not-allowed; }
    .start-battle-btn:not(:disabled):hover { transform:scale(1.06); box-shadow:0 4px 20px rgba(204,0,0,.5); }
    .eligible-hint { color:var(--muted); font-size:.75rem; text-align:center; margin-bottom:1rem; }
    .battle-card-sel .inv-card { cursor:pointer; }

    .battle-field { display:flex; flex-direction:column; gap:.8rem; }
    .battle-side { background:var(--card); border-radius:16px; padding:1rem; border:1px solid var(--border); }
    .battle-side-lbl { font-size:.62rem; font-weight:900; text-transform:uppercase; letter-spacing:2px; color:var(--muted); margin-bottom:.7rem; }
    .battle-side.opp-side  { border-color:#882222; background:linear-gradient(180deg,rgba(80,0,0,.18),transparent); }

}

let abortCtrl = null;
let usedOffline = false;

function save() { try{ localStorage.setItem('pokepack_v4',JSON.stringify(S)); }catch(e){} }

// ════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════
function fmt(n) { return '$'+Math.abs(n).toFixed(2); }
function getTier(rarity) { return RARITY_TO_TIER[rarity]||'common'; }
function rand(a,b) { return a+Math.random()*(b-a); }

function pickWeighted(pool) {
  const total=Object.values(pool).reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(const[k,w] of Object.entries(pool)){ r-=w; if(r<=0)return k; }
  return Object.keys(pool)[0];
}

function estimateValue(card) {
  const t=getTier(card.rarity);
  const [mn,mx]=TIER[t].valueRange;
  let v=rand(mn,mx);
  const name=(card.name||'').toLowerCase();
  for(const[mon,m] of Object.entries(HOT_MONS)){
    if(name.includes(mon)){ v*=rand(m.mn,m.mx); break; }
  }
  return Math.min(parseFloat(v.toFixed(2)), mx*5);
}

// ════════════════════════════════════════
//  API  (with timeout + graceful fallback)
// ════════════════════════════════════════
// ── Pool cache (localStorage) ─────────────────────────────────────────────
const POOL_CACHE_KEY = 'pkpack_pools_v5';

function savePools() {
  try {
    const out = {};
    for (const [k, v] of Object.entries(cardPools)) {
      if (!v._live) continue; // skip offline-fallback pools
      out[k] = {};
      for (const [tier, cards] of Object.entries(v)) {
        if (tier === '_live') continue;
        out[k][tier] = cards.map(c => ({
          id: c.id, name: c.name, hp: c.hp, rarity: c.rarity,
          attacks: (c.attacks||[]).map(a => ({ name: a.name, damage: a.damage, text: (a.text||'').slice(0,120) })),
          images: { small: c.images?.small||'' }
        }));
      }
    }
    localStorage.setItem(POOL_CACHE_KEY, JSON.stringify(out));
  } catch(e) {}
}

function loadPools() {
  try {
    const d = localStorage.getItem(POOL_CACHE_KEY);
    if (!d) return;
    const saved = JSON.parse(d);
    for (const [k, v] of Object.entries(saved)) {
      if (!cardPools[k]) cardPools[k] = { ...v, _live: true };
    }
  } catch(e) {}
}

async function fetchPool(setId) {
  if (cardPools[setId]) return false; // already in memory (or loaded from cache)

  abortCtrl = new AbortController();
  const timeout = setTimeout(() => abortCtrl.abort(), 25000); // 25 s
  showLoad(`Loading ${SET_META.find(s=>s.id===setId)?.name||setId}…`);

  try {
    // select= reduces response from ~500 KB to ~60 KB — much faster
    const r = await fetch(
      `https://api.pokemontcg.io/v2/cards?q=set.id:${setId}&pageSize=250&select=id,name,hp,attacks,rarity,images`,
      { signal: abortCtrl.signal }
    );
    clearTimeout(timeout);
    if (!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();

    const pools = { common:[],uncommon:[],rare:[],holo:[],ultra:[],secret:[] };
    for (const c of data.data) {
      if (!c.images?.small) continue;
      const t = getTier(c.rarity);
      pools[t].push(c);
    }
    // Guarantee every tier has at least the offline fallback cards
    for (const t of TIER_ORDER) {
      if (!pools[t].length) pools[t] = [...OFFLINE_POOL[t]||[]];
    }
    cardPools[setId] = { ...pools, _live: true };
    savePools(); // persist so next visit is instant
    return false; // not offline
  } catch(e) {
    clearTimeout(timeout);
    cardPools[setId] = { ...OFFLINE_POOL }; // offline fallback
    return true;
  } finally {
    hideLoad();
    abortCtrl = null;
  }
}

function cancelLoad() {
  if (abortCtrl) abortCtrl.abort();
}

// ════════════════════════════════════════
//  DRAW PACK  (fixed recursion)
// ════════════════════════════════════════
function drawPack(setId) {
  const pools = cardPools[setId];
  const cards = [];

  function pickFrom(tier, depth=0) {
    if (depth > 5) {
      // absolute fallback: return a guaranteed common
      const fb = OFFLINE_POOL.common;
      const raw = fb[Math.floor(Math.random()*fb.length)];
      return { ...raw, tier:'common', value: estimateValue(raw) };
    }
    const p = pools[tier];
    if (!p || !p.length) {
      // step down the rarity order toward common
      const idx = TIER_ORDER.indexOf(tier);
      const next = TIER_ORDER[Math.min(idx+1, TIER_ORDER.length-1)];
      return pickFrom(next, depth+1);
    }
    const raw = p[Math.floor(Math.random()*p.length)];
    return { ...raw, tier, value: estimateValue(raw) };
  }

  for (let i=0;i<6;i++) cards.push(pickFrom('common'));
  for (let i=0;i<3;i++) cards.push(pickFrom('uncommon'));

  // Rare+ slot — only pick from tiers with cards
  const available = Object.fromEntries(
    Object.entries(RARE_WEIGHTS).filter(([t]) => (pools[t]||[]).length > 0)
  );
  const rareTier = Object.keys(available).length ? pickWeighted(available) : 'rare';
  cards.push(pickFrom(rareTier));

  // Shuffle
  for (let i=cards.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [cards[i],cards[j]]=[cards[j],cards[i]];
  }
  return cards;
}

let _toastTimer = null;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className='show'+(type?' t-'+type:'');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>el.className='', 3800);
}

function sparkles(x, y, n=10) {
  const em=['⭐','✨','💫','🌟','⚡','🎉'];
  for (let i=0;i<n;i++) {
    const d=document.createElement('div');
    d.className='spark'; d.textContent=em[Math.floor(Math.random()*em.length)];
    const ang=(Math.PI*2/n)*i, dist=70+Math.random()*60;
    d.style.cssText=`left:${x}px;top:${y}px;--tx:${Math.cos(ang)*dist}px;--ty:${Math.sin(ang)*dist}px`;
    document.body.appendChild(d);
    setTimeout(()=>d.remove(), 1200);
  }
}

function showLoad(txt) { document.getElementById('loadTxt').textContent=txt; document.getElementById('loadOverlay').classList.add('show'); }
function hideLoad()    { document.getElementById('loadOverlay').classList.remove('show'); }

// ════════════════════════════════════════
//  BUY PACK
// ════════════════════════════════════════
async function buyPack(setId) {
  const meta = SET_META.find(s=>s.id===setId);
  if (!meta || S.money < meta.price) { toast('Not enough money!','err'); return; }

  S.money -= meta.price; S.stats.spent += meta.price; S.stats.packsOpened++;
  updateMoney(); renderShop();

  try {
    usedOffline = await fetchPool(setId);
    S.pending = drawPack(setId).map(c => ({...c, uid: S.nextId++}));
    S.revealed = 0;
    openModal(meta.name);
  } catch(e) {
    S.money += meta.price; S.stats.spent -= meta.price; S.stats.packsOpened--;
    updateMoney(); renderShop();
    toast('Something went wrong. Try again.','err');
  }
}

function openModal(setName) {
  document.getElementById('modalSetName').textContent = '🎴 '+setName;
  document.getElementById('modalHint').textContent = 'Click each card to flip it!';
  document.getElementById('offlineBadge').style.display = usedOffline ? '' : 'none';
  document.getElementById('modalActions').classList.remove('show');
  document.getElementById('revealAllBtn').style.display = '';

  document.getElementById('flipGrid').innerHTML = S.pending.map((c,i) => {
    const tc = TIER[c.tier];
    // isOffline cards use PokeAPI artwork (transparent PNG) — display in a styled frame
    // API cards use the full TCG card image — display cover-fit
    const frontInner = c.isOffline
      ? `<div class="artwork-frame" style="background:linear-gradient(160deg,${tc.color}55 0%,#0d0d20 70%)">
           <img src="${c.images?.small||''}" alt="${c.name}" class="artwork-img"
                onerror="this.style.display='none'">
           <div class="artwork-name">${c.name}</div>
           <div class="artwork-rar" style="color:${tc.color}">${tc.label}</div>
         </div>`
      : `<img src="${c.images?.small||''}" alt="${c.name}"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="card-css" style="display:none;background:linear-gradient(145deg,${tc.color}33,${tc.color}11)">
           <div class="mon-emoji">${c.emoji||'🃏'}</div>
           <div class="mon-name">${c.name}</div>
           <div class="mon-rar" style="color:${tc.color}">${tc.label}</div>
         </div>`;
    return `
      <div class="flip-slot tier-${c.tier}" id="fs${i}" onclick="flipCard(${i})">
        <div class="flip-inner">
          <div class="flip-face flip-back"><div class="pokeball"></div></div>
          <div class="flip-face flip-front">
            ${frontInner}
            <div class="rarity-badge" style="color:${tc.color}">${tc.label}</div>
            <div class="val-badge">${fmt(c.value)}</div>
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('packModal').classList.add('open');
}

function flipCard(i) {
  const slot = document.getElementById('fs'+i);
  if (!slot || slot.classList.contains('flipped')) return;
  slot.classList.add('flipped');
  S.revealed++;

  const card = S.pending[i];
  S.stats.found[card.tier] = (S.stats.found[card.tier]||0)+1;

  const rect = slot.getBoundingClientRect();
  const cx = rect.left+rect.width/2, cy = rect.top+rect.height/2;

  if (card.tier==='secret') {
    setTimeout(()=>{ sparkles(cx,cy,14); toast(`🌈 SECRET RARE! ${card.name} — ${fmt(card.value)}!`,'secret'); },600);
  } else if (card.tier==='ultra') {
    setTimeout(()=>{ sparkles(cx,cy,10); toast(`⚡ ULTRA RARE! ${card.name} — ${fmt(card.value)}`,'ultra'); },600);
  } else if (card.tier==='holo') {
    setTimeout(()=>toast(`✨ Holo Rare! ${card.name}`,'holo'),600);
  }

  if (S.revealed === S.pending.length) setTimeout(allFlipped, 500);
}

function revealAll() {
  document.getElementById('revealAllBtn').style.display = 'none';
  S.pending.forEach((_,i) => setTimeout(()=>flipCard(i), i*130));
}

function allFlipped() {
  document.getElementById('modalHint').textContent = 'Choose what to do with your cards:';
  document.getElementById('revealAllBtn').style.display = 'none';
  const total = S.pending.reduce((s,c)=>s+c.value,0);
  document.getElementById('packTotalEl').textContent = fmt(total);
  document.getElementById('modalActions').classList.add('show');
}

function closeModal() { document.getElementById('packModal').classList.remove('open'); S.pending=[]; save(); }

function keepAll() {
  S.pending.forEach(c=>{ S.inventory.push({...c}); trackBest(c); });
  const n=S.pending.length; closeModal(); toast(`Added ${n} cards to collection!`,'ok');
}

function discardCommons() {
  const commons=S.pending.filter(c=>c.tier==='common');
  const keepers=S.pending.filter(c=>c.tier!=='common');
  const earned=commons.reduce((s,c)=>s+c.value,0);
  S.money+=earned; S.stats.earned+=earned;
  keepers.forEach(c=>{ S.inventory.push({...c}); trackBest(c); });
  closeModal(); updateMoney();
  toast(`Kept ${keepers.length} cards · Sold ${commons.length} commons for ${fmt(earned)}`,'ok');
}

function sellAllPack() {
  const earned=S.pending.reduce((s,c)=>s+c.value,0);
  S.money+=earned; S.stats.earned+=earned;
  S.pending.forEach(c=>trackBest(c));
  closeModal(); updateMoney();
  toast(`Sold all 10 cards for ${fmt(earned)}!`,'ok');
}

// ════════════════════════════════════════
//  COLLECTION
// ════════════════════════════════════════
function renderCollection() {
  const q    = (document.getElementById('collSearch').value||'').toLowerCase();
  const rf   = document.getElementById('rarSel').value;
  const sort = document.getElementById('sortSel').value;

  let cards = S.inventory.filter(c=>{
    if (rf!=='all' && c.tier!==rf) return false;
    if (q && !c.name.toLowerCase().includes(q)) return false;
    return true;
  });

  if (sort==='rarity')    cards.sort((a,b)=>TIER_ORDER.indexOf(a.tier)-TIER_ORDER.indexOf(b.tier)||b.value-a.value);
  else if (sort==='value-hi') cards.sort((a,b)=>b.value-a.value);
  else if (sort==='value-lo') cards.sort((a,b)=>a.value-b.value);
  else if (sort==='name')     cards.sort((a,b)=>a.name.localeCompare(b.name));

  const totalVal = S.inventory.reduce((s,c)=>s+c.value,0);
  document.getElementById('collSummary').textContent = `${S.inventory.length} cards · ${fmt(totalVal)} value`;

  const grid = document.getElementById('invGrid');
  if (!cards.length) {
    grid.innerHTML = `<div class="empty"><div class="icon">📦</div><p>${
      S.inventory.length ? 'No cards match your filters.' : 'Buy some packs to start your collection!'
    }</p></div>`;
    return;
  }

  grid.innerHTML = cards.map(c => {
    const tc = TIER[c.tier];
    const sellTxt = (c.tier==='common'||c.tier==='uncommon') ? '#000' : '#fff';
    // Offline cards: show artwork in a styled frame so name always matches image
    const imgSection = c.isOffline
      ? `<div class="inv-artwork-wrap" style="background:linear-gradient(160deg,${tc.color}44 0%,#0d0d20 80%)">
           <img class="inv-artwork-img" src="${c.images?.small||''}" alt="${c.name}" loading="lazy"
                onerror="this.style.display='none'">
         </div>`
      : `<img class="inv-img" src="${c.images?.small||''}" alt="${c.name}" loading="lazy"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="inv-img-placeholder" style="display:none;background:${tc.color}18">
           <div class="em">${c.emoji||'🃏'}</div>
           <div class="nm">${c.name}</div>
         </div>`;
    return `
      <div class="inv-card tier-${c.tier}${selected.has(c.uid)?' selected':''}"
           id="ic${c.uid}" onclick="toggleSel(${c.uid})">
        <div class="inv-check">✓</div>
        ${imgSection}
        <div class="inv-info">
          <div class="inv-name">${c.name}</div>
          <div class="inv-meta">
            <span class="inv-rar" style="color:${tc.color}">${tc.label}</span>
            <span class="inv-val">${fmt(c.value)}</span>
          </div>
        </div>
        <div class="inv-sell-overlay">
          <button class="inv-sell-btn"
                  style="background:${tc.color};color:${sellTxt}"
                  onclick="event.stopPropagation();quickSell(${c.uid})">
            Sell ${fmt(c.value)}
          </button>
        </div>
      </div>`;
  }).join('');

  updateSelBtn();
}

function toggleSel(uid) {
  if (selected.has(uid)) selected.delete(uid); else selected.add(uid);
  renderCollection();
}

function updateSelBtn() {
  const btn = document.getElementById('sellSelBtn');
  if (!selected.size) { btn.classList.remove('show'); return; }
  const total = S.inventory.filter(c=>selected.has(c.uid)).reduce((s,c)=>s+c.value,0);
  btn.textContent = `💰 Sell Selected (${fmt(total)})`;
  btn.classList.add('show');
}

function quickSell(uid) {
  const c = S.inventory.find(x=>x.uid===uid); if(!c) return;
  S.money+=c.value; S.stats.earned+=c.value;
  S.inventory=S.inventory.filter(x=>x.uid!==uid); selected.delete(uid);
  updateMoney(); toast(`Sold ${c.name} for ${fmt(c.value)}`,'ok');
  renderCollection();
}

function sellSelected() {
  if (!selected.size) return;
  const toSell=S.inventory.filter(c=>selected.has(c.uid));
  const earned=toSell.reduce((s,c)=>s+c.value,0);
  S.money+=earned; S.stats.earned+=earned;
  S.inventory=S.inventory.filter(c=>!selected.has(c.uid)); selected.clear();
  updateMoney(); toast(`Sold ${toSell.length} cards for ${fmt(earned)}!`,'ok');
  renderCollection();
}

function sellCommons() {
  const commons=S.inventory.filter(c=>c.tier==='common');
  if (!commons.length) { toast('No common cards to sell.'); return; }
  const earned=commons.reduce((s,c)=>s+c.value,0);
  S.money+=earned; S.stats.earned+=earned;
  S.inventory=S.inventory.filter(c=>c.tier!=='common');
  commons.forEach(c=>selected.delete(c.uid));
  updateMoney(); toast(`Sold ${commons.length} commons for ${fmt(earned)}`,'ok');
  renderCollection();
}

}

// ════════════════════════════════════════
//  BATTLE SYSTEM
// ════════════════════════════════════════
let BS = null;        // active battle state
let battleTeam = [];  // uids of selected cards for upcoming battle

// ── Helpers ──────────────────────────────
function parseDmg(s) {
  if (!s) return 0;
  const m = String(s).match(/^(\d+)/);
  return m ? parseInt(m[1]) : 0;
}
function hpColor(hp, max) {
  const p = hp / max;
  return p > .5 ? '#3ddc5a' : p > .25 ? '#ffaa00' : '#ff4444';
}
function nextLive(team, skip) {
  for (let i = 0; i < team.length; i++) {
    if (i !== skip && !team[i]._fainted) return i;
  }
  return null;
}
function mkBattleCard(c) {
  const max = parseInt(c.hp) || 60;
  return { ...c, _maxHp: max, _hp: max, _fainted: false };
}
function getEligibleCards() {
  return S.inventory.filter(c => c.attacks && c.attacks.length > 0);
}

// ── Team building ─────────────────────────
function renderBattleView() {
  document.getElementById('bpDisplay').textContent = S.battlePoints || 0;
  const rp = document.getElementById('retreatPill');
  if (BS && (BS.phase === 'player-turn' || BS.phase === 'opponent-turn' || BS.phase === 'swap-fainted' || BS.phase === 'retreat')) {
    rp.style.display = '';
    document.getElementById('retreatsLeft').textContent = BS.retreatsLeft;
  } else {
    rp.style.display = 'none';
  }
  if (!BS) renderBattleTeamSelect();
  else     renderBattleField();
}

function renderBattleTeamSelect() {
  const eligible = getEligibleCards();
  const sel = battleTeam.map(uid => eligible.find(c => c.uid === uid)).filter(Boolean);

  function slotHTML(c) {
    if (!c) return '<div class="bslot">?</div>';
    const i = sel.indexOf(c);
    const thumb = c.isOffline
      ? `<div class="inv-artwork-wrap" style="width:100%;height:100%;background:linear-gradient(160deg,${TIER[c.tier]?.color||'#444'}44,#0d0d20)">
           <img class="inv-artwork-img" src="${c.images?.small||''}" alt="${c.name}" onerror="this.style.display='none'">
         </div>`
      : `<img src="${c.images?.small||''}" alt="${c.name}"
              style="width:100%;height:100%;object-fit:cover"
              onerror="this.style.display='none'">`;
    return `<div class="bslot filled">
      ${thumb}
      <button class="bslot-rmv" onclick="removeBattleSlot(${i})">✕</button>
    </div>`;
  }

  const content = document.getElementById('battleContent');
  if (eligible.length === 0) {
    content.innerHTML = `
      <div class="battle-selected-slots">${[0,1,2].map(()=>'<div class="bslot">?</div>').join('')}</div>
      <div class="empty"><div class="icon">⚔️</div>
        <p>No battle-ready cards yet!</p>
        <p style="font-size:.75rem;margin-top:.5rem;color:var(--muted)">Open packs to get Pokémon cards with real attacks. Offline-pool cards don't have attacks.</p>
      </div>`;
    return;
  }

  content.innerHTML = `
    <div class="battle-selected-slots">
      ${[0,1,2].map(i => slotHTML(sel[i])).join('')}
    </div>
    <div style="text-align:center;margin-bottom:1.2rem">
      <button class="start-battle-btn" ${sel.length===3?'':'disabled'} onclick="startBattle()">
        ⚔️ ${sel.length===3 ? 'Start Battle!' : `Select ${3-sel.length} more`}
      </button>
    </div>
    <div class="eligible-hint">${eligible.length} battle-eligible card${eligible.length!==1?'s':''} — select 3</div>
    <div class="battle-card-sel">
      <div class="inv-grid">
        ${eligible.map(c => {
          const isSel = battleTeam.includes(c.uid);
          const tc = TIER[c.tier];
          const imgSec = c.isOffline
            ? `<div class="inv-artwork-wrap" style="background:linear-gradient(160deg,${tc.color}44 0%,#0d0d20 80%)">
                 <img class="inv-artwork-img" src="${c.images?.small||''}" alt="${c.name}" loading="lazy" onerror="this.style.display='none'">
               </div>`
            : `<img class="inv-img" src="${c.images?.small||''}" alt="${c.name}" loading="lazy"
                    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
               <div class="inv-img-placeholder" style="display:none;background:${tc.color}18">
                 <div class="em">${c.emoji||'🃏'}</div><div class="nm">${c.name}</div>
               </div>`;
          const atksPreview = (c.attacks||[]).slice(0,2).map(a=>`${a.name}${parseDmg(a.damage)?` ${parseDmg(a.damage)}`:''}`).join(' · ');
          return `
            <div class="inv-card tier-${c.tier}${isSel?' selected':''}" onclick="toggleBattleCard(${c.uid})" style="cursor:pointer">
              ${isSel ? '<div style="position:absolute;top:4px;right:4px;background:var(--gold);color:#111;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;z-index:5">✓</div>' : ''}
              ${imgSec}
              <div class="inv-info">
                <div class="inv-name">${c.name}</div>
                <div class="inv-meta">
                  <span class="inv-rar" style="color:${tc.color}">${c.hp||'?'} HP</span>
                  <span style="font-size:.5rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70px">${atksPreview}</span>
                </div>
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>`;
}

function toggleBattleCard(uid) {
  if (battleTeam.includes(uid)) battleTeam = battleTeam.filter(u=>u!==uid);
  else if (battleTeam.length < 3) battleTeam.push(uid);
  renderBattleTeamSelect();
}
function removeBattleSlot(i) {
  battleTeam.splice(i, 1);
  renderBattleTeamSelect();
}

function buildOpponentTeam() {
  const all = [];
  for (const pools of Object.values(cardPools)) {
    for (const tier of Object.values(pools)) {
      if (!Array.isArray(tier)) continue;
      for (const c of tier) {
        if (c.attacks && c.attacks.length > 0 && !c.isOffline) all.push(c);
      }
    }
  }
  if (all.length < 3) return null;
  return all.slice().sort(()=>Math.random()-.5).slice(0,3);
}

// ── Start ─────────────────────────────────
function startBattle() {
  const eligible = getEligibleCards();
  const playerCards = battleTeam.map(uid=>eligible.find(c=>c.uid===uid)).filter(Boolean);
  if (playerCards.length !== 3) { toast('Select 3 cards to battle!'); return; }
  const oppCards = buildOpponentTeam();
  if (!oppCards) { toast('Open packs first so the opponent has attack cards!'); return; }
  BS = {
    player:      playerCards.map(mkBattleCard),
    opponent:    oppCards.map(mkBattleCard),
    playerActive:   0,
    opponentActive: 0,
    retreatsLeft: 2,
    log: ['⚔️ Battle Start! Choose your attack!'],
    phase: 'player-turn',
    winner: null,
    opponentPrize: null,
  };
  battleTeam = [];
  renderBattleView();
}

// ── Rendering ─────────────────────────────
function renderBattleField() {
  const content = document.getElementById('battleContent');
  if (BS.phase === 'prize' || BS.phase === 'end') { renderEndScreen(); return; }

  const pa = BS.player[BS.playerActive];
  const oa = BS.opponent[BS.opponentActive];
  const isSwapping  = BS.phase === 'swap-fainted';
  const isRetreating = BS.phase === 'retreat';
  const canAct = BS.phase === 'player-turn';

  // bench: alive cards that aren't active
  const pBench = BS.player.map((c,i)=>({c,i})).filter(({c,i})=>i!==BS.playerActive&&!c._fainted);
  const oBench = BS.opponent.map((c,i)=>({c,i})).filter(({c,i})=>i!==BS.opponentActive&&!c._fainted);

  content.innerHTML = `
    <div class="battle-side opp-side">
      <div class="battle-side-lbl">⚔️ Opponent's Team</div>
      <div class="battle-row">
        <div class="battle-active-wrap">${activeCardHTML(oa)}</div>
        <div class="bench-stack">
          ${oBench.map(({c})=>benchCardHTML(c,false)).join('')}
        </div>
      </div>
    </div>

    <div class="battle-log" id="battleLog">
      ${BS.log.slice(-8).map(l=>`<div class="log-line">${l}</div>`).join('')}
    </div>

    <div class="battle-side plr-side">
      <div class="battle-side-lbl">🧢 Your Team</div>
      <div class="battle-row">
        <div class="battle-active-wrap">${activeCardHTML(pa)}</div>
        <div class="bench-stack">
          ${pBench.map(({c,i})=>benchCardHTML(c, isSwapping||isRetreating, i)).join('')}
        </div>
      </div>
    </div>

    <div class="battle-actions">
      ${isSwapping ? `
        <div class="swap-prompt">💀 ${pa.name} fainted! Send in your next Pokémon!</div>
        ${pBench.length===0 ? '<div style="color:#ff4444;font-size:.85rem">No Pokémon remaining…</div>' : ''}
      ` : isRetreating ? `
        <div class="swap-prompt">↩ Pick a bench Pokémon to switch in:</div>
      ` : `
        <div class="battle-actions-title">⚡ ${pa.name}'s Attacks</div>
        <div class="attack-btns">
          ${pa.attacks.map((a,i)=>{
            const dmg = parseDmg(a.damage);
            return `<button class="attack-btn" onclick="playerAttack(${i})">
              <span class="atk-name">${a.name}${dmg>0?`<span class="atk-dmg">${dmg} dmg</span>`:''}</span>
              ${a.text ? `<span class="atk-eff">${a.text.substring(0,70)}${a.text.length>70?'…':''}</span>` : ''}
            </button>`;
          }).join('')}
        </div>
        <button class="retreat-btn"
          ${BS.retreatsLeft<=0||pBench.length===0?'disabled':''}
          onclick="initiateRetreat()">
          ↩ Retreat (${BS.retreatsLeft} left)
        </button>
      `}
    </div>`;

  const log = document.getElementById('battleLog');
  if (log) log.scrollTop = log.scrollHeight;
}

function activeCardHTML(c) {
  const col = hpColor(c._hp, c._maxHp);
  const pct = c._hp / c._maxHp * 100;
  const img = c.isOffline
    ? `<div class="b-active-artwork" style="background:linear-gradient(160deg,${TIER[c.tier]?.color||'#444'}44,#0d0d20)">
         <img src="${c.images?.small||''}" alt="${c.name}" onerror="this.style.display='none'">
         <div class="b-lbl">${c.name}</div>
       </div>`
    : `<img src="${c.images?.small||''}" alt="${c.name}"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
       <div style="display:none;width:110px;height:154px;background:#111;border-radius:10px;flex-direction:column;align-items:center;justify-content:center;gap:.3rem">
         <div style="font-size:2rem">${c.emoji||'🃏'}</div>
         <div style="font-size:.6rem;font-weight:900;text-align:center">${c.name}</div>
       </div>`;
  return `<div class="b-active-card">
    <div class="active-badge">ACTIVE</div>
    ${img}
    ${c._fainted?'<div class="fainted-overlay">💀</div>':''}
    <div class="hp-bar-wrap">
      <div class="hp-bar"><div class="hp-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="hp-text" style="color:${col}">${c._hp}/${c._maxHp} HP</div>
    </div>
  </div>`;
}

function benchCardHTML(c, selectable, idx) {
  const onclick = selectable && idx!==undefined ? `onclick="sendReplacement(${idx})"` : '';
  const img = c.isOffline
    ? `<div class="b-bench-artwork" style="background:linear-gradient(160deg,${TIER[c.tier]?.color||'#444'}33,#0d0d20)">
         <img src="${c.images?.small||''}" alt="${c.name}" onerror="this.style.display='none'">
       </div>`
    : `<img src="${c.images?.small||''}" alt="${c.name}"
            onerror="this.style.display='none'">`;
  return `<div class="b-bench-card${selectable?' selectable':''}" ${onclick}>
    ${img}
    <div class="b-bench-lbl">${c.name}</div>
    <div class="b-bench-hp">${c._hp}/${c._maxHp}</div>
  </div>`;
}

// ── Actions ───────────────────────────────
function playerAttack(atkIdx) {
  if (!BS || BS.phase !== 'player-turn') return;
  const atk   = BS.player[BS.playerActive].attacks[atkIdx];
  const atker = BS.player[BS.playerActive];
  const defdr = BS.opponent[BS.opponentActive];
  const dmg   = parseDmg(atk.damage);
  defdr._hp   = Math.max(0, defdr._hp - dmg);
  BS.log.push(`⚡ Your ${atker.name} used ${atk.name}!${dmg>0?` (${dmg} dmg)`:' (no damage)'}`);
  if (defdr._hp <= 0) {
    defdr._fainted = true;
    BS.log.push(`💀 Opponent's ${defdr.name} fainted!`);
    const nxt = nextLive(BS.opponent, BS.opponentActive);
    if (nxt === null) { endBattle('player'); return; }
    BS.opponentActive = nxt;
    BS.log.push(`🔄 Opponent sends out ${BS.opponent[BS.opponentActive].name}!`);
  }
  opponentTurn();
}

function initiateRetreat() {
  if (!BS || BS.retreatsLeft <= 0) return;
  BS.phase = 'retreat';
  renderBattleView();
}

function sendReplacement(idx) {
  if (!BS) return;
  if (BS.phase !== 'swap-fainted' && BS.phase !== 'retreat') return;
  const wasRetreat = BS.phase === 'retreat';
  BS.playerActive = idx;
  if (wasRetreat) {
    BS.retreatsLeft--;
    BS.log.push(`↩ You retreated! ${BS.player[idx].name} enters the field!`);
  } else {
    BS.log.push(`✨ ${BS.player[idx].name} enters the field!`);
  }
  BS.phase = 'player-turn';
  renderBattleView();
}

function opponentTurn() {
  BS.phase = 'opponent-turn';
  renderBattleView();
  setTimeout(() => {
    if (!BS) return;
    const atker = BS.opponent[BS.opponentActive];
    const defdr = BS.player[BS.playerActive];
    // AI picks highest-damage attack
    let bestAtk = atker.attacks[0], bestDmg = -1;
    for (const a of atker.attacks) { const d=parseDmg(a.damage); if(d>bestDmg){bestDmg=d;bestAtk=a;} }
    const dmg = parseDmg(bestAtk.damage);
    defdr._hp = Math.max(0, defdr._hp - dmg);
    BS.log.push(`🔥 Opponent's ${atker.name} used ${bestAtk.name}!${dmg>0?` (${dmg} dmg)`:' (no damage)'}`);
    if (defdr._hp <= 0) {
      defdr._fainted = true;
      BS.log.push(`💀 Your ${defdr.name} fainted!`);
      const nxt = nextLive(BS.player, BS.playerActive);
      if (nxt === null) { endBattle('opponent'); return; }
      BS.phase = 'swap-fainted';
    } else {
      BS.phase = 'player-turn';
    }
    renderBattleView();
  }, 900);
}

// ── End game ──────────────────────────────
function endBattle(winner) {
  BS.winner = winner;
  if (winner === 'player') {
    S.battlePoints = (S.battlePoints||0) + 3;
    BS.log.push('🏆 You win! +3 Battle Points!');
    setTimeout(()=>sparkles(window.innerWidth/2, window.innerHeight/2, 18), 200);
    toast('🏆 Victory! +3 Battle Points!', 'secret');
    BS.phase = 'prize';
  } else {
    S.battlePoints = Math.max(0, (S.battlePoints||0) - 1);
    BS.log.push('😔 You lost. -1 Battle Point.');
    toast('😔 Defeated! -1 Battle Point.', 'holo');
    // Opponent picks a random card from player's surviving team
    const alive = BS.player.filter(c=>!c._fainted);
    const pick  = alive.length ? alive[Math.floor(Math.random()*alive.length)] : BS.player[0];
    BS.opponentPrize = pick;
    const ix = S.inventory.findIndex(c=>c.uid===pick.uid);
    if (ix !== -1) S.inventory.splice(ix, 1);
    BS.phase = 'end';
  }
  save();
  renderBattleView();
}

function renderEndScreen() {
  const won = BS.winner === 'player';
  document.getElementById('battleContent').innerHTML = `
    <div class="battle-end">
      <div class="battle-end-title" style="color:${won?'var(--gold)':'#ff4444'}">${won?'🏆 VICTORY!':'💀 DEFEATED'}</div>
      <div class="battle-end-pts" style="color:${won?'#2ecc71':'#ff5555'}">
        ${won?'+3':'-1'} Battle Points &nbsp;·&nbsp; Total: <strong>${S.battlePoints||0} pts</strong>
      </div>
      ${won ? `
        <div class="prize-prompt">⭐ Pick 1 card from the opponent's team:</div>
        <div class="prize-grid">
          ${BS.opponent.map((c,i)=>{
            const imgH = c.isOffline
              ? `<div class="prize-card-art" style="background:linear-gradient(160deg,${TIER[c.tier]?.color||'#444'}44,#0d0d20)">
                   <img src="${c.images?.small||''}" alt="${c.name}" onerror="this.style.display='none'">
                 </div>`
              : `<img src="${c.images?.small||''}" alt="${c.name}"
                      onerror="this.style.display='none'">`;
            return `<div class="prize-card" onclick="playerPickPrize(${i})">${imgH}<div class="prize-name">${c.name}</div></div>`;
          }).join('')}
        </div>
      ` : `
        <div class="taken-msg">😢 Opponent took your <strong>${BS.opponentPrize?.name||'card'}</strong>!</div>
        <button class="battle-restart-btn" onclick="restartBattle()">⚔️ Battle Again</button>
      `}
    </div>`;
}

function playerPickPrize(idx) {
  const c = BS.opponent[idx];
  const newCard = { ...c, uid: S.nextId++, tier: getTier(c.rarity||'Common'), value: estimateValue(c) };
  delete newCard._maxHp; delete newCard._hp; delete newCard._fainted;
  S.inventory.push(newCard);
  save();
  toast(`⭐ ${c.name} added to your collection!`, 'ok');
  restartBattle();
}

function restartBattle() {
  BS = null;
  battleTeam = [];
  renderBattleView();
}

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
load();
loadPools();  // restore cached card pools from localStorage
renderShop();
updateMoney();
</script>
</body>
